<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>Odbytová fakturace</title>
<link rel="manifest" href="manifest.json">
<style>
/* ═══════════════════════════════════════════════════════════════════════
   ODBYTOVÁ FAKTURACE — tabulka staveb (sloupce řízené konfigurací COLUMNS)
   ═══════════════════════════════════════════════════════════════════════ */
:root{
  --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --line:#334155;
  --txt:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8;
  --wait1:#f59e0b; --wait2:#3b82f6; --done:#22c55e; --none:#475569;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--txt);font-size:15px;line-height:1.4;padding-bottom:env(safe-area-inset-bottom)}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:15px}

#gate{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;text-align:center}
#gate h1{font-size:24px;margin:0}
#gate p{color:var(--muted);max-width:420px;margin:0}
.btn-google{background:#fff;color:#1f2937;border:none;border-radius:10px;padding:12px 22px;font-size:16px;font-weight:600;display:flex;align-items:center;gap:10px}
.gate-err{color:#ef4444;font-size:14px;max-width:420px}
.gate-or{color:var(--muted);font-size:13px;margin-top:4px}
.gate-warn{color:#fbbf24;font-size:12px;max-width:300px;line-height:1.4;background:#3a2d12;border:1px solid #5c4715;border-radius:8px;padding:7px 10px}
#phoneBox{display:flex;flex-direction:column;gap:10px;align-items:center;width:280px}
.phone-row{display:flex;width:100%;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel2)}
.phone-row .pref{padding:11px 12px;background:var(--panel);color:var(--muted);font-weight:700;border-right:1px solid var(--line)}
.phone-row input{flex:1;border:none;background:transparent;color:var(--txt);padding:11px 12px;font-size:16px;outline:none}
#codeBox{display:flex;flex-direction:column;gap:10px;width:100%}
#codeInput{border:1px solid var(--line);border-radius:10px;background:var(--panel2);color:var(--txt);padding:11px 12px;font-size:16px;text-align:center;letter-spacing:3px}
.btn-phone{background:var(--accent);color:#06283d;border:none;border-radius:10px;padding:11px 16px;font-size:15px;font-weight:700}
#recaptcha-container{min-height:0}

header{position:sticky;top:0;z-index:50;background:var(--panel);border-bottom:1px solid var(--line);padding:10px 14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
header .title{font-weight:700;font-size:17px;margin-right:auto;display:flex;align-items:center;gap:8px}
header select,.who{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 10px}
.who{display:flex;align-items:center;gap:8px;font-size:13px}
.who .role-badge{background:var(--accent);color:#06283d;border-radius:6px;padding:1px 7px;font-weight:700;font-size:11px;text-transform:uppercase}
.btn{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:14px}
.btn:hover{background:#324158}
.btn-primary{background:var(--accent);color:#06283d;border-color:transparent;font-weight:700}
.btn-lock{background:#3a2d12;color:#fbbf24;border-color:#5c4715}

.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;padding:14px}
.sumcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.sumcard h3{margin:0 0 4px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.sumcard .big{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
.sumcard .sub{font-size:12px;color:var(--muted);margin-top:3px}

.toolbar{display:flex;flex-wrap:wrap;gap:8px;padding:0 14px 12px;align-items:center}
.toolbar input,.toolbar .chk{background:var(--panel);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:13px}
.chk{display:flex;align-items:center;gap:6px;color:var(--muted)}
.toolbar .grow{flex:1;min-width:160px}
.lockbanner{margin:0 14px 12px;background:#3a2d12;border:1px solid #5c4715;color:#fbbf24;border-radius:10px;padding:10px 14px;font-size:14px}
.flagbanner{margin:0 14px 12px;background:#3a2b16;border:1px solid #fb923c;color:#fdba74;border-radius:10px;padding:9px 14px;font-size:13px;line-height:1.5}
.flagbanner b{color:#fb923c}
.flag-link{color:#fde68a;text-decoration:underline;font-weight:700;cursor:pointer}
.flag-link:hover{color:#fff}

#wrap{padding:0 14px 100px;overflow-x:auto}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px}
thead th{background:var(--panel2);text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.02em;padding:7px 12px 7px 10px;font-weight:700;white-space:normal;overflow-wrap:break-word;word-break:break-word;position:relative;vertical-align:top}
thead th.num{text-align:right}
.resizer{position:absolute;top:0;right:0;width:8px;height:100%;cursor:col-resize;user-select:none}
.resizer:hover,.resizer.drag{background:var(--accent)}
tbody td{padding:6px 9px;border-top:1px solid var(--line);vertical-align:top}
/* Zmrazený první sloupec „Stavba" – při posunu do boku zůstává vidět, na které stavbě jsi */
#wrap thead th[data-col="stavba"]{position:sticky;left:0;z-index:6;background:var(--panel2);border-right:2px solid var(--line)}
#wrap td.stavba{position:sticky;left:0;z-index:4;background:var(--panel);border-right:2px solid var(--line)}
tbody tr:hover{background:#21304a}
tbody tr:hover td.stavba{background:#243044}
tbody tr.rowlock{background:rgba(34,197,94,.05)}
tbody tr.rowlock:hover{background:rgba(34,197,94,.09)}
tbody tr.rowlock td.stavba{box-shadow:inset 3px 0 0 var(--done)}
/* Jemné podbarvení řádku podle „Fakturuje se": zeleně = ano, červeně = ne (vč. zmrazené buňky) */
#wrap tbody tr.fakt-ano{background:rgba(34,197,94,.09)}
#wrap tbody tr.fakt-ano:hover{background:rgba(34,197,94,.15)}
#wrap tr.fakt-ano td.stavba{background:#1b2e26}
#wrap tbody tr.fakt-ano:hover td.stavba{background:#214036}
#wrap tbody tr.fakt-ne{background:rgba(239,68,68,.09)}
#wrap tbody tr.fakt-ne:hover{background:rgba(239,68,68,.15)}
#wrap tr.fakt-ne td.stavba{background:#301f24}
#wrap tbody tr.fakt-ne:hover td.stavba{background:#3d262c}
/* „Bude změna" – výrazné a ODLIŠNÉ od nefakturuje (tlustý oranžový pruh + jantarové podbarvení) */
#wrap tbody tr.flagrow{background:rgba(251,146,60,.14)}
#wrap tbody tr.flagrow:hover{background:rgba(251,146,60,.2)}
#wrap tr.flagrow td.stavba{background:#3a2b16;box-shadow:inset 5px 0 0 #fb923c}
#wrap tbody tr.flagrow:hover td.stavba{background:#473419}
.stavba .kod{font-weight:800;color:var(--accent);font-size:13px}
.stavba .nazev{color:var(--txt);font-size:12.5px}
.stavba-meta{color:var(--muted);font-size:11px;margin-top:1px}
.stavba-meta b{color:#cbd5e1;font-weight:600}
.obj-line{color:var(--muted);font-size:11px;margin-top:2px}
.obj-line b{color:var(--accent);font-weight:700}
.stavba-cont{padding-left:6px}
tbody tr.nodivider td{border-top:none}
tbody tr.nodivider td.stavba{box-shadow:inset 2px 0 0 var(--accent)}
.stavba-pozn{color:#fbbf24;font-size:12px;margin-top:3px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.num{text-align:right}
.cellinput{width:100%;max-width:100%;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:13px}
.amt-input{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.note-input{resize:none;overflow:hidden;min-height:38px;line-height:1.35;white-space:pre-wrap;word-break:break-word;font-size:13px}
.cellinput::placeholder{color:#64748b;font-weight:400}
.cellinput:disabled{opacity:.55;cursor:not-allowed}
.stampline{font-size:10px;color:var(--muted);margin-top:3px;white-space:normal;line-height:1.3;word-break:break-word}
.checktoggle{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--txt)}
.checktoggle input{width:18px;height:18px;accent-color:var(--done)}
.checktoggle.dis{opacity:.55;cursor:not-allowed}

.badge{display:inline-block;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;text-transform:uppercase;white-space:normal;overflow-wrap:break-word}
.b-none{background:#475569;color:#e2e8f0}
.b-rozhodnout{background:#f59e0b;color:#3a2d05}
.b-zadat{background:#06b6d4;color:#042b33}
.b-odsouhl{background:#a855f7;color:#fff}
.b-ekonomka{background:#3b82f6;color:#fff}
.b-done{background:#22c55e;color:#04330f}
.b-wait1{background:var(--wait1);color:#3a2d05}
.b-wait2{background:var(--wait2);color:#fff}
.yesno{display:inline-flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.yesno.undecided{border-color:var(--wait1);box-shadow:0 0 0 2px rgba(245,158,11,.25)}
.yn{border:none;background:var(--panel2);color:var(--muted);padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer}
.yn+.yn{border-left:1px solid var(--line)}
.yn.yn-yes.on{background:var(--done);color:#04330f}
.yn.yn-no.on{background:var(--nefakturovat,#ef4444);color:#fff}
.yn:disabled{opacity:.55;cursor:not-allowed}
tr.poznrow td{border-top:none;padding:0 12px 11px 12px;color:#fbbf24;font-size:13px;white-space:normal;cursor:pointer}
tr.poznrow:hover td{color:#fcd34d}
tr.poznrow .addpozn{color:var(--muted);font-style:italic}
.vedomi-btn{border:1px solid var(--line);background:var(--panel2);color:var(--txt);border-radius:8px;padding:7px 11px;font-size:13px;white-space:nowrap}
.vedomi-btn.on{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.5);color:#86efac;font-weight:700}
.vedomi-btn:disabled{opacity:.55;cursor:default}
.b-zmena{background:#fb923c;color:#3a2305;margin-top:6px;font-weight:800;box-shadow:0 0 0 2px rgba(251,146,60,.35)}
.flag-btn{display:block;margin-top:6px;background:var(--panel2);color:#fca5a5;border:1px solid #5b2330;border-radius:8px;padding:5px 9px;font-size:12px;white-space:nowrap}
.flag-btn.on{background:rgba(239,68,68,.2);border-color:var(--nefakturovat);color:#fecaca;font-weight:700}
/* Příznak „Bude změna" má vlastní výrazný štítek; řádek podbarvuje Fakturuje se, ne tohle. */

.empty{text-align:center;color:var(--muted);padding:50px 20px}
.fab{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:40;background:var(--accent);color:#06283d;border:none;border-radius:50px;padding:14px 20px;font-size:15px;font-weight:800;box-shadow:0 6px 20px rgba(0,0,0,.4)}

/* Rychlá odezva dotyku (bez 300ms delay / dvojkliku-zoomu) na všech tlačítkách */
button,.yn,.vedomi-btn,.flag-btn{touch-action:manipulation}

/* Mobil: kartové zobrazení (každý řádek = karta), BEZ vodorovného posouvání –
   na dotyku se tím Ano/Ne ťuká spolehlivě. */
@media(max-width:680px){
  #wrap{overflow-x:visible}
  table,thead,tbody,tr,td{display:block}
  table{border:none;background:transparent}
  thead{display:none}
  tbody tr{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;padding:4px 4px;background:var(--panel)}
  tbody td{border:none;border-top:1px solid var(--line);padding:9px 12px;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:8px 12px}
  tbody td:first-child{border-top:none}
  tbody td::before{content:attr(data-l);color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.03em;flex:0 0 auto;max-width:48%}
  tbody td .stampline{flex-basis:100%;max-width:100%;text-align:right;white-space:normal;overflow:visible}
  td.stavba{flex-direction:column;align-items:flex-start;position:static;border-right:none;background:transparent}
  td.stavba::before{display:none}
  #wrap thead th[data-col="stavba"]{position:static}
  .cellinput{width:150px;max-width:58%}
  .note-input{width:175px}
  .yn{padding:11px 18px;font-size:15px}
  .vedomi-btn,.flag-btn{padding:11px 14px;font-size:14px}
  tr.poznrow td{display:block}
  tr.poznrow td::before{display:none}
}

.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:92vh;overflow:auto;padding:18px}
@media(min-width:560px){.modal-bg{align-items:center}.modal{border-radius:16px}}
.modal h2{margin:0 0 14px;font-size:18px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.field input{width:100%;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:10px}
.modal-actions{display:flex;gap:10px;justify-content:space-between;margin-top:8px}
.hint{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.4}
.user-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
.user-info{flex:1;min-width:0}
.user-sub{color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis}
.user-role{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:14px}
.demo-flag{position:fixed;left:8px;bottom:8px;z-index:30;background:#3a2d12;color:#fbbf24;border:1px solid #5c4715;border-radius:6px;padding:3px 8px;font-size:11px;opacity:.85}
</style>
</head>
<body>

<div id="gate">
  <h1>🧾 Odbytová fakturace</h1>
  <p>Sdílená tabulka měsíční fakturace staveb. Pro vstup se přihlaste firemním účtem Google.</p>
  <button class="btn-google" id="btnLogin">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Přihlásit se přes Google
  </button>

  <div class="gate-or">nebo přes telefon (SMS)</div>
  <div class="gate-warn">⚠️ SMS je <b>zpoplatněná</b> — pokud to jde, přihlas se raději přes <b>Google</b> (zdarma).</div>
  <div id="phoneBox">
    <div class="phone-row"><span class="pref">+420</span><input id="phoneInput" type="tel" inputmode="numeric" placeholder="123 456 789" maxlength="11"></div>
    <div id="recaptcha-container"></div>
    <button class="btn-phone" id="btnSendCode">Poslat SMS kód</button>
    <div id="codeBox" style="display:none">
      <input id="codeInput" type="text" inputmode="numeric" placeholder="kód z SMS (6 číslic)" maxlength="6">
      <button class="btn-phone" id="btnVerifyCode">Ověřit a přihlásit</button>
    </div>
  </div>
  <div class="gate-err" id="gateErr"></div>
</div>

<div id="app" style="display:none">
  <header>
    <div class="title">🧾 Odbytová fakturace</div>
    <select id="monthSel" title="Měsíc"></select>
    <button class="btn" id="btnNewMonth" title="Založit další měsíc">+ měsíc</button>
    <button class="btn btn-danger" id="btnDelMonth" title="Smazat tento měsíc (jen admin)" style="display:none">🗑</button>
    <button class="btn btn-lock" id="btnLock">🔒 Uzavřít</button>
    <button class="btn" id="btnUsers" title="Správa uživatelů a rolí (jen admin)" style="display:none">👥 Uživatelé</button>
    <div class="who" id="whoBox"></div>
  </header>

  <div id="lockBanner"></div>
  <div id="flagBanner"></div>
  <div class="summary" id="summary"></div>

  <div class="toolbar">
    <input id="search" class="grow" placeholder="🔎 hledat stavbu…">
    <label class="chk"><input type="checkbox" id="hideEmpty"> skrýt stavby bez částky</label>
    <label class="chk"><input type="checkbox" id="hideNefakt"> skrýt nefakturované (Ne)</label>
  </div>

  <div id="wrap"></div>
  <button class="fab" id="fab">+ Stavba</button>
</div>

<div id="modalRoot"></div>
<div id="demoFlag"></div>

/* ═══ Datová vrstva ═══ */
const DB={
  async init(){
    if(DEMO){ const d=demoLoad();
      STAVBY_SEED.forEach((s,i)=>{const id="s"+i;if(!d.stavby[id])d.stavby[id]={...s,poradi:i};});
      if(!Object.keys(d.obdobi).length)d.obdobi[curMonthStr()]={zamceno:false,zamkl:null,radky:{}};
      demoSave(d); return; }
    firebase.initializeApp(FIREBASE_CONFIG); fdb=firebase.database();
    // Pozn.: STAVBY_SEED se do živé DB NEnahrává z appky (zápis před přihlášením pravidla odmítnou
    // a navíc by to přepisovalo úpravy). Seznam staveb je nahrán jednorázově do DB přes Firebase CLI.
  },
  async listMonths(){
    if(DEMO)return Object.keys(demoLoad().obdobi).sort().reverse();
    const snap=await fdb.ref("fakturace/obdobi").get();const v=snap.val()||{};const k=Object.keys(v);
    if(!k.length){const m=curMonthStr();
      try{await fdb.ref("fakturace/obdobi/"+m).update({zamceno:false});}catch(e){/* zakládá jen admin – nevadí, měsíc se zobrazí i tak */}
      return[m];}
    return k.sort().reverse();
  },
  watchStavby(cb){
    if(DEMO){const read=()=>cb(demoLoad().stavby||{});read();DB._stavbyRead=read;return;}
    fdb.ref("fakturace/stavby").on("value",s=>cb(s.val()||{}));
  },
  watchUsers(cb){
    if(DEMO){cb({demo:{jmeno:me.jmeno,email:me.email,role:me.role}});return;}
    fdb.ref("fakturace/uzivatele").on("value",s=>cb(s.val()||{}));
  },
  async setUserRole(uid,role){
    if(DEMO)return;
    await fdb.ref("fakturace/uzivatele/"+uid+"/role").set(role);
  },
  watchMonth(month,cb){
    if(unsub){unsub();unsub=null;}
    if(DEMO){
      const read=()=>cb(demoLoad().obdobi[month]||{zamceno:false,zamkl:null,radky:{}});read();
      const h=(e)=>{if(e.key===LS_KEY){read();DB._stavbyRead&&DB._stavbyRead();}};
      window.addEventListener("storage",h);DB._monthRead=read;
      unsub=()=>{window.removeEventListener("storage",h);DB._monthRead=null;};return;
    }
    const ref=fdb.ref("fakturace/obdobi/"+month);
    const handler=ref.on("value",s=>{const v=s.val()||{zamceno:false,zamkl:null,radky:{}};v.radky=v.radky||{};cb(v);});
    unsub=()=>ref.off("value",handler);
  },
  async addStavba(s){const poradi=Object.keys(stavby).length;
    if(DEMO){const d=demoLoad();d.stavby["s"+Date.now()]={...s,poradi};demoSave(d);DB._stavbyRead&&DB._stavbyRead();return;}
    await fdb.ref("fakturace/stavby").push({...s,poradi});},
  async updateStavba(id,patch){
    if(DEMO){const d=demoLoad();Object.assign(d.stavby[id],patch);demoSave(d);DB._stavbyRead&&DB._stavbyRead();return;}
    await fdb.ref("fakturace/stavby/"+id).update(patch);},
  async removeStavba(id){
    if(DEMO){const d=demoLoad();delete d.stavby[id];demoSave(d);DB._stavbyRead&&DB._stavbyRead();return;}
    await fdb.ref("fakturace/stavby/"+id).remove();},
  async setRadek(month,stavbaId,patch){
    if(DEMO){const d=demoLoad();d.obdobi[month]=d.obdobi[month]||{zamceno:false,zamkl:null,radky:{}};
      d.obdobi[month].radky[stavbaId]=Object.assign({},d.obdobi[month].radky[stavbaId]||{},patch);demoSave(d);DB._monthRead&&DB._monthRead();return;}
    await fdb.ref("fakturace/obdobi/"+month+"/radky/"+stavbaId).update(patch);},
  async setLock(month,locked){const patch={zamceno:locked,zamkl:locked?stamp():null};
    if(DEMO){const d=demoLoad();Object.assign(d.obdobi[month],patch);demoSave(d);DB._monthRead&&DB._monthRead();return;}
    await fdb.ref("fakturace/obdobi/"+month).update(patch);},
  async createMonth(month){
    if(DEMO){const d=demoLoad();if(!d.obdobi[month])d.obdobi[month]={zamceno:false,zamkl:null,radky:{}};demoSave(d);return;}
    await fdb.ref("fakturace/obdobi/"+month).update({zamceno:false});},
  async deleteMonth(month){
    if(DEMO){const d=demoLoad();delete d.obdobi[month];demoSave(d);return;}
    await fdb.ref("fakturace/obdobi/"+month).remove();}
};

/* ═══ Auth ═══ */
function roleFor(uid,email,profiles){
  if(profiles&&profiles[uid]&&profiles[uid].role)return profiles[uid].role;
  if(email&&ADMIN_EMAILS.includes(email.toLowerCase()))return "admin";
  return "priprava";
}
async function startAuth(){
  if(DEMO){
    document.getElementById("gate").style.display="none";document.getElementById("app").style.display="block";
    document.getElementById("demoFlag").innerHTML='<div class="demo-flag">DEMO mód (localStorage) — data jen v tomto prohlížeči</div>';
    me={uid:"demo",jmeno:"Demo uživatel",email:"demo@local",role:"admin"};await afterLogin();return;
  }
  const auth=firebase.auth();
  const gateErr=t=>document.getElementById("gateErr").textContent=t||"";
  // Když se vracíme z přesměrovaného přihlášení (mobil), případnou chybu ukážeme.
  auth.getRedirectResult().catch(e=>{ if(e&&e.message) gateErr("Přihlášení selhalo: "+e.message); });
  // Google — na mobilu PŘESMĚROVÁNÍ (popup se na telefonu často zasekne), na desktopu popup.
  const isMobile=/Android|iPhone|iPad|iPod|Mobile|Silk|Opera Mini/i.test(navigator.userAgent);
  // Popup funguje spolehlivě jen na Firebase doméně (first-party). Na github.io a na mobilu
  // použij přesměrování – popup tam blokují cookies třetích stran (bílé okno).
  const onFbDomain=/(^|\.)firebaseapp\.com$|(^|\.)web\.app$/i.test(location.hostname);
  document.getElementById("btnLogin").onclick=async()=>{
    gateErr(""); const provider=new firebase.auth.GoogleAuthProvider();
    try{
      if(onFbDomain && !isMobile){ await auth.signInWithPopup(provider); }
      else{ await auth.signInWithRedirect(provider); }
    }catch(e){
      const c=e&&e.code;
      if(c==="auth/popup-blocked"||c==="auth/cancelled-popup-request"||c==="auth/popup-closed-by-user"||c==="auth/operation-not-supported-in-this-environment"){
        try{ await auth.signInWithRedirect(provider); }catch(e2){ gateErr("Přihlášení selhalo: "+e2.message); }
      } else { gateErr("Přihlášení selhalo: "+(e&&e.message||e)); }
    }
  };
  // Telefon (SMS) — jen české číslo (+420, 9 číslic)
  let recaptcha=null, confirmRes=null;
  document.getElementById("btnSendCode").onclick=async()=>{
    gateErr("");
    let n=document.getElementById("phoneInput").value.replace(/\D/g,"").replace(/^0+/,"");
    if(!/^\d{9}$/.test(n)){gateErr("Zadej platné české číslo: 9 číslic za +420.");return;}
    const phone="+420"+n;
    try{
      if(!recaptcha){recaptcha=new firebase.auth.RecaptchaVerifier("recaptcha-container",{size:"normal"});await recaptcha.render();}
      confirmRes=await auth.signInWithPhoneNumber(phone,recaptcha);
      document.getElementById("codeBox").style.display="flex";
      document.getElementById("btnSendCode").textContent="SMS odeslána ✓ (poslat znovu)";
      gateErr("");
    }catch(e){gateErr("Nepodařilo se odeslat SMS: "+e.message); if(recaptcha){try{recaptcha.clear();}catch(_){} recaptcha=null;}}
  };
  document.getElementById("btnVerifyCode").onclick=async()=>{
    gateErr("");
    if(!confirmRes){gateErr("Nejdřív si nech poslat SMS kód.");return;}
    try{await confirmRes.confirm(document.getElementById("codeInput").value.trim());}
    catch(e){gateErr("Špatný nebo prošlý kód.");}
  };
  auth.onAuthStateChanged(async user=>{
    if(!user){document.getElementById("gate").style.display="flex";document.getElementById("app").style.display="none";return;}
    const prof=(await fdb.ref("fakturace/uzivatele").get()).val()||{};
    const existing=prof[user.uid]||{};
    const isPhone=!!user.phoneNumber && !user.email;
    document.getElementById("gate").style.display="none";document.getElementById("app").style.display="block";
    // jméno: Google → displayName; telefon → uložené jméno, jinak se na něj zeptáme (povinné)
    let jmeno=user.displayName||user.email||((existing.jmeno&&existing.jmeno!==user.phoneNumber)?existing.jmeno:"");
    if(isPhone && !jmeno){ jmeno=await askName(); }
    if(!jmeno) jmeno=user.phoneNumber||user.email||"Uživatel";
    me={uid:user.uid,jmeno,email:(user.email||"").toLowerCase(),telefon:user.phoneNumber||"",role:roleFor(user.uid,user.email,prof)};
    fdb.ref("fakturace/uzivatele/"+user.uid).update({jmeno:me.jmeno,email:me.email,telefon:me.telefon});
    await afterLogin();
  });
}
// Povinné zadání jména pro přihlášení telefonem (vrátí zadané jméno).
function askName(){
  return new Promise(resolve=>{
    document.getElementById("modalRoot").innerHTML=`
     <div class="modal-bg"><div class="modal">
       <h2>Vítej! Doplň své jméno</h2>
       <div class="hint">Přihlásil(a) ses telefonem. Zadej jméno a příjmení, ať tě ostatní v tabulce poznají (ukáže se i s číslem).</div>
       <div class="field"><label>Jméno a příjmení</label><input id="nmInput" placeholder="Jan Novák" autocomplete="name"></div>
       <div class="modal-actions"><span></span><button class="btn btn-primary" id="nmSave">Uložit a pokračovat</button></div>
     </div></div>`;
    const inp=document.getElementById("nmInput");
    const save=()=>{const v=inp.value.trim();if(v.length<3){inp.style.borderColor="#ef4444";inp.focus();return;}closeModal();resolve(v);};
    document.getElementById("nmSave").onclick=save;
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")save();});
    setTimeout(()=>inp.focus(),50);
  });
}
async function afterLogin(){
  DB.watchStavby(s=>{stavby=s;render();});
  DB.watchUsers(u=>{users=u;renderUsersList();});

}

/* ═══ Helpers ═══ */
const fmt=n=>(Number(n)||0).toLocaleString("cs-CZ",{minimumFractionDigits:2,maximumFractionDigits:2})+" Kč";
const fmtNum=n=>(Number(n)||0).toLocaleString("cs-CZ",{minimumFractionDigits:2,maximumFractionDigits:2}); // 1 250 000,00
// Parsuje částku z textu: zvládne mezery (i pevné), čárku i tečku jako desetinnou; 2 desetinná místa.
const parseAmount=s=>{ if(s==null)return null; let t=String(s).replace(/[\s\u00a0\u202f]/g,"").replace(",",".").replace(/[^\d.\-]/g,""); if(t==="")return null; const n=Number(t); return isNaN(n)?null:Math.round(n*100)/100; };
const autoGrow=el=>{el.style.height="auto";el.style.height=(el.scrollHeight+2)+"px";};
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmtDate=iso=>{if(!iso)return"";const d=new Date(iso);return d.toLocaleDateString("cs-CZ",{day:"numeric",month:"numeric"})+" "+d.toLocaleTimeString("cs-CZ",{hour:"2-digit",minute:"2-digit"});};
const fmtDay=s=>{if(!s)return"";const d=new Date(s);return d.toLocaleDateString("cs-CZ",{day:"numeric",month:"numeric",year:"numeric"});};
const hasVal=v=>v!=null&&v!=="";
const isAdmin=()=>me.role==="admin";
const canRole=(roles)=>roles.includes(me.role)||isAdmin();

function renderWho(){
  document.getElementById("whoBox").innerHTML=
    `<span>${esc(me.jmeno)}</span><span class="role-badge">${ROLE_LABEL[me.role]||me.role}</span>`+
    (DEMO?roleSwitcherHtml():`<button class="btn" id="btnLogout" style="padding:4px 8px">Odhlásit</button>`);
  if(DEMO)document.getElementById("demoRole").onchange=e=>{me.role=e.target.value;renderWho();render();};
  else{const lo=document.getElementById("btnLogout");if(lo)lo.onclick=()=>firebase.auth().signOut();}
}
function roleSwitcherHtml(){return `<select id="demoRole" title="Demo: přepni roli">`+
  Object.keys(ROLE_LABEL).map(r=>`<option value="${r}" ${me.role===r?"selected":""}>${ROLE_LABEL[r]}</option>`).join("")+`</select>`;}

function buildMonthSel(){const sel=document.getElementById("monthSel");
  if(!monthsList.includes(curMonth))monthsList.unshift(curMonth);
  sel.innerHTML=monthsList.map(m=>`<option value="${m}">${monthLabel(m)}</option>`).join("");sel.value=curMonth;}
function monthLabel(m){const[y,mo]=m.split("-");const n=["","leden","únor","březen","duben","květen","červen","červenec","srpen","září","říjen","listopad","prosinec"];return n[+mo]+" "+y;}
function selectMonth(m){curMonth=m;DB.watchMonth(m,d=>{monthData=d;render();});}

function radekStav(r){
  r=r||{};
  if(r.fakturujeSe===false)return{label:"Nefakturuje se",cls:"b-none"};
  if(r.fakturujeSe==null)return{label:"Rozhodnout: fakturovat?",cls:"b-rozhodnout"};
  if(r.naVedomi)return{label:"Vzato na vědomí 🔒",cls:"b-done"};
  if(hasVal(r.odsouhlaseno))return{label:"Čeká na ekonomku",cls:"b-ekonomka"};
  if(hasVal(r.predpoklad))return{label:"Čeká na odsouhlasení",cls:"b-odsouhl"};
  return{label:"Zadat částku",cls:"b-zadat"};
}

  bl.disabled=monthData.zamceno&&!isAdmin();
  document.getElementById("btnDelMonth").style.display=isAdmin()?"":"none";
  document.getElementById("btnNewMonth").style.display=(isAdmin()||me.role==="ekonomka")?"":"none";
  document.getElementById("btnUsers").style.display=isAdmin()?"":"none";
  document.getElementById("fab").style.display=monthData.zamceno?"none":"";
  const lb=document.getElementById("lockBanner");
  if(monthData.zamceno){const z=monthData.zamkl||{};lb.innerHTML=`<div class="lockbanner">🔒 <b>Měsíc uzavřen</b> — jen čtení.${z.jmeno?` Uzavřel(a) ${esc(z.jmeno)} ${fmtDate(z.kdy)}.`:""}</div>`;}else lb.innerHTML="";
  renderFlagBanner();
  renderSummary();renderTable();
}
function renderFlagBanner(){
  const fb=document.getElementById("flagBanner");
  const flagged=rowsArr().filter(x=>x.r.budeZmena);
  if(!flagged.length){fb.innerHTML="";return;}
  const items=flagged.map(x=>`<a href="#" class="flag-link" data-rk="${x.rowKey}">${esc(x.kod)}${x.objednatel?" ("+esc(x.objednatel)+")":""}</a>`).join(", ");
  fb.innerHTML=`<div class="flagbanner">⚠️ <b>Pozor — u těchto staveb bude ještě změna:</b> ${items}</div>`;
  fb.querySelectorAll(".flag-link").forEach(a=>a.onclick=e=>{e.preventDefault();const tr=document.querySelector('#wrap tr[data-id="'+a.dataset.rk+'"]');if(tr)tr.scrollIntoView({block:"center",behavior:"smooth"});});
}

// Více objednatelů odděl znakem "+" (např. "KSUS+město") → každý objednatel = vlastní řádek.
function objednateleOf(s){ return String(s.objednatel||"").split("+").map(t=>t.trim()).filter(Boolean); }

function rowsArr(){
  const out=[];
  Object.entries(stavby).sort((a,b)=>(a[1].poradi||0)-(b[1].poradi||0)||(a[1].kod||"").localeCompare(b[1].kod))
    .forEach(([id,s])=>{
      const objs=objednateleOf(s); const list=objs.length?objs:[null];   // 1 řádek i bez objednatele
      list.forEach((obj,idx)=>{
        const rowKey=id+"__"+idx;   // POZOR: oddělovač NESMÍ být '#' (Firebase zakazuje # . $ [ ] v cestě)
        out.push({...s, id, rowKey, idx, first:idx===0, last:idx===list.length-1, multi:list.length>1,
          objednatel:obj, r:(monthData.radky||{})[rowKey]||{}});
      });
    });
  return out;
}
function renderSummary(){
  const rows=rowsArr();
  const sP=rows.reduce((a,x)=>a+(hasVal(x.r.predpoklad)?+x.r.predpoklad:0),0);
  const sO=rows.reduce((a,x)=>a+(hasVal(x.r.odsouhlaseno)?+x.r.odsouhlaseno:0),0);
  const sV=rows.reduce((a,x)=>a+(x.r.naVedomi&&hasVal(x.r.odsouhlaseno)?+x.r.odsouhlaseno:0),0);
  const cFakt=rows.filter(x=>x.r.fakturujeSe===true).length;
  const cNeroz=rows.filter(x=>x.r.fakturujeSe==null).length;
  const cVed=rows.filter(x=>x.r.naVedomi).length;
  document.getElementById("summary").innerHTML=
    `<div class="sumcard"><h3>Předpoklad</h3><div class="big">${fmt(sP)}</div><div class="sub">${cFakt} fakturovat${cNeroz?` · <span style="color:var(--wait1)">${cNeroz} nerozhodnuto</span>`:""}</div></div>
     <div class="sumcard"><h3>Odsouhlaseno</h3><div class="big">${fmt(sO)}</div></div>
     <div class="sumcard"><h3>Vzato na vědomí</h3><div class="big" style="color:var(--done)">${fmt(sV)}</div><div class="sub">${cVed} z ${cFakt} hotovo</div></div>`;
}

/* ═══ Šířky sloupců (roztahovatelné jako v Excelu, uložené v localStorage) ═══ */
const COLDEFS=[{id:"stavba",def:240},
  ...COLUMNS.map(c=>({id:c.key,def:({amount:130,text:150,date:150,check:120,yesno:120}[c.type]||140)})),
  {id:"ekonomka",def:160},{id:"stav",def:180}];
let colW=(()=>{try{return JSON.parse(localStorage.getItem("odbyt_colw"))||{};}catch(e){return{};}})();
const saveColW=()=>localStorage.setItem("odbyt_colw",JSON.stringify(colW));
const colWidth=(id,def)=>colW[id]||def;
function buildColgroup(){return `<colgroup>${COLDEFS.map(c=>`<col data-col="${c.id}" style="width:${colWidth(c.id,c.def)}px">`).join("")}</colgroup>`;}
function wireResizers(){
  const table=document.querySelector("#wrap table");if(!table)return;
  document.querySelectorAll("#wrap thead .resizer").forEach(rz=>{
    rz.addEventListener("mousedown",e=>{
      e.preventDefault();e.stopPropagation();
      const th=rz.closest("th"),id=th.dataset.col,col=table.querySelector('col[data-col="'+id+'"]');
      const startX=e.clientX,startW=col.getBoundingClientRect().width;rz.classList.add("drag");
      const move=ev=>{const w=Math.max(60,startW+(ev.clientX-startX));col.style.width=w+"px";colW[id]=w;};
      const up=()=>{document.removeEventListener("mousemove",move);document.removeEventListener("mouseup",up);rz.classList.remove("drag");document.body.style.cursor="";saveColW();};
      document.addEventListener("mousemove",move);document.addEventListener("mouseup",up);document.body.style.cursor="col-resize";
    });
  });
}

function renderTable(){
  const q=document.getElementById("search").value.toLowerCase();
  const hideEmpty=document.getElementById("hideEmpty").checked;
  const hideNefakt=document.getElementById("hideNefakt").checked;
  let rows=rowsArr().filter(x=>{
    if(q&&!((x.kod+" "+x.nazev).toLowerCase().includes(q)))return false;
    if(hideEmpty&&!hasVal(x.r.predpoklad))return false;
    if(hideNefakt&&x.r.fakturujeSe===false)return false;
    return true;});
  const wrap=document.getElementById("wrap");
  if(!Object.keys(stavby).length){wrap.innerHTML=`<div class="empty">Zatím žádné stavby. Přidej je přes „+ Stavba" vpravo dole.</div>`;return;}
  if(!rows.length){wrap.innerHTML=`<div class="empty">Nic neodpovídá filtru.</div>`;return;}
  const rsz=`<span class="resizer"></span>`;
  const head=`<th data-col="stavba" title="Stavba">Stavba${rsz}</th>`+
    COLUMNS.map(c=>`<th data-col="${c.key}" class="${c.type==='amount'?'num':''}" title="${esc(c.label)}">${esc(c.label)}${rsz}</th>`).join("")+
    `<th data-col="ekonomka" title="Ekonomka">Ekonomka${rsz}</th><th data-col="stav" title="Stav">Stav${rsz}</th>`;
  wrap.innerHTML=`<table style="table-layout:fixed;min-width:100%">${buildColgroup()}<thead><tr>${head}</tr></thead><tbody>${rows.map(rowHtml).join("")}</tbody></table>`;
  wireTable();wireResizers();
}

function cellHtml(c,r,disabled){
  const stampObj=r[c.key+"By"];
  const st=stampObj?`<div class="stampline" title="${esc(stampObj.jmeno)} · ${fmtDate(stampObj.kdy)}">${esc(stampObj.jmeno)} · ${fmtDate(stampObj.kdy)}</div>`:"";
  const dis=disabled?"disabled":"";
  if(c.type==="amount")
    return `<td class="num" data-l="${esc(c.label)}"><input class="cellinput amt-input" data-f="${c.key}" data-t="amount" inputmode="decimal" placeholder="—" value="${r[c.key]!=null?fmtNum(r[c.key]):""}" ${dis}>${st}</td>`;
  if(c.type==="yesno"){const v=r[c.key];
    return `<td data-l="${esc(c.label)}"><div class="yesno ${(v==null&&c.req)?'undecided':''}">
      <button class="yn yn-yes ${v===true?'on':''}" data-f="${c.key}" data-yn="yes" ${dis}>Ano</button>
      <button class="yn yn-no ${v===false?'on':''}" data-f="${c.key}" data-yn="no" ${dis}>Ne</button>
    </div>${st}</td>`;}
  if(c.type==="text")
    return `<td data-l="${esc(c.label)}"><input class="cellinput txt-input" data-f="${c.key}" data-t="text" placeholder="${esc(c.ph||"")}" value="${esc(r[c.key]??"")}" ${dis}>${st}</td>`;
  if(c.type==="note")
    return `<td data-l="${esc(c.label)}"><textarea class="cellinput note-input" data-f="${c.key}" data-t="note" rows="1" placeholder="${esc(c.ph||"")}" ${dis}>${esc(r[c.key]??"")}</textarea>${st}</td>`;
  if(c.type==="date")
    return `<td data-l="${esc(c.label)}"><input class="cellinput date-input" data-f="${c.key}" data-t="date" type="date" value="${r[c.key]??""}" ${dis}>${st}</td>`;
  if(c.type==="check")
    return `<td data-l="${esc(c.label)}"><label class="checktoggle ${disabled?'dis':''}"><input type="checkbox" data-f="${c.key}" data-t="check" ${r[c.key]?"checked":""} ${dis}> ${r[c.key]?"ano":"ne"}</label>${st}</td>`;
  return `<td></td>`;
}

function rowHtml(x){
  const r=x.r;const st=radekStav(r);
  const monthLocked=monthData.zamceno;
  const rowLocked=!!r.naVedomi;               // ekonomka vzala na vědomí → řádek zamčen
  const baseDisabled=(monthLocked||rowLocked)&&!isAdmin();  // admin smí vše; + per-sloupec role
  const cells=COLUMNS.map(c=>{
    // lockExempt sloupce (faktura odeslána) jdou měnit i po zamčení řádku – jen ne po uzávěrce měsíce.
    const dis = c.lockExempt ? ((monthLocked&&!isAdmin())||!canRole(c.roles)) : (baseDisabled||!canRole(c.roles));
    return cellHtml(c,r,dis);
  }).join("");
  const canVed=canRole(VEDOMI_ROLES)&&(!monthLocked||isAdmin());
  const ved=r.naVedomi;
  const vedBtn=ved
    ? `<button class="vedomi-btn on" data-act="vedomi" ${canVed?"":"disabled"} title="${canVed?'Klikni pro odemčení řádku':'Zamčeno ekonomkou'}">✓ Vzato 🔒</button><div class="stampline">${esc(ved.jmeno)} · ${fmtDate(ved.kdy)}</div>`
    : `<button class="vedomi-btn" data-act="vedomi" ${(canVed&&hasVal(r.odsouhlaseno))?"":"disabled"} title="${!hasVal(r.odsouhlaseno)?'Nejdřív odsouhlasená částka':(canVed?'':'Smí jen ekonomka')}">Vzít na vědomí</button>`;
  // Příznak „Bude změna" — příprava/stavbyvedoucí ho smí zaškrtnout I po vzetí na vědomí (zamčení),
  // aby upozornili, že se odsouhlasená částka ještě změní. Funguje nezávisle na zámku řádku.
  const canFlag=canRole(R_EDIT)&&(!monthLocked||isAdmin());
  const zmena=r.budeZmena;
  const flagBadge=zmena?`<div class="badge b-zmena">⚠️ BUDE ZMĚNA</div>${r.budeZmenaBy?`<div class="stampline">${esc(r.budeZmenaBy.jmeno)} · ${fmtDate(r.budeZmenaBy.kdy)}</div>`:""}`:"";
  const flagBtn=canFlag?`<button class="flag-btn ${zmena?'on':''}" data-act="zmena">${zmena?'✓ zrušit příznak':'⚠️ Bude změna'}</button>`:"";
  const colspan=COLDEFS.length;
  const objLine=x.objednatel?`<div class="obj-line">${x.multi?"↳ ":""}Objednatel: <b>${esc(x.objednatel)}</b></div>`:(x.multi?`<div class="obj-line">↳ Objednatel: <b>—</b></div>`:"");
  const stavbyLine=x.stavbyvedouci?`<div class="stavba-meta">Stavbyvedoucí: <b>${esc(x.stavbyvedouci)}</b></div>`:"";
  const stavbaCell=x.first
    ? `<div><span class="kod">${esc(x.kod)}</span> <span class="nazev">${esc(x.nazev||"")}</span></div>
       ${objLine}
       ${stavbyLine}`
    : `<div class="stavba-cont">${objLine}</div>`;
  const poznRow=x.last?`<tr class="poznrow" data-id="${x.id}"><td colspan="${colspan}">${x.poznamka?`📝 ${esc(x.poznamka)}`:`<span class="addpozn">📝 přidat poznámku ke stavbě…</span>`}</td></tr>`:"";
  const faktClass=r.fakturujeSe===true?'fakt-ano':(r.fakturujeSe===false?'fakt-ne':'');
  return `<tr class="${rowLocked?'rowlock':''} ${!x.first?'nodivider':''} ${zmena?'flagrow':''} ${faktClass}" data-id="${x.rowKey}" data-sid="${x.id}">
    <td class="stavba" data-l="Stavba">${stavbaCell}</td>
    ${cells}
    <td data-l="Ekonomka">${vedBtn}</td>
    <td data-l="Stav"><span class="badge ${st.cls}">${st.label}</span>${flagBadge}${flagBtn}</td>
  </tr>${poznRow}`;
}

function wireTable(){
  document.querySelectorAll("#wrap tr[data-id]").forEach(tr=>{
    const id=tr.dataset.id;
    tr.querySelectorAll("input[data-f],textarea[data-f]").forEach(inp=>{
      if(inp.dataset.t==="note"){ autoGrow(inp); inp.addEventListener("input",()=>autoGrow(inp)); }
      inp.addEventListener("change",()=>{
        const f=inp.dataset.f,t=inp.dataset.t;let val;
        if(t==="amount"){val=parseAmount(inp.value);}
        else if(t==="check")val=inp.checked?true:null;
        else val=inp.value===""?null:inp.value;
        const patch={[f]:val};patch[f+"By"]=val==null?null:stamp();
        if(f==="odsouhlaseno"&&val==null)patch.naVedomi=null;   // bez odsouhlasené nelze na vědomí
        DB.setRadek(curMonth,id,patch);
      });
    });
    tr.querySelectorAll(".yn[data-yn]").forEach(btn=>{
      btn.onclick=()=>{ if(btn.disabled)return; const f=btn.dataset.f,val=btn.dataset.yn==="yes";
        DB.setRadek(curMonth,id,{[f]:val,[f+"By"]:stamp()}); };
    });
    const vb=tr.querySelector('[data-act="vedomi"]');
    if(vb)vb.onclick=()=>{const r=(monthData.radky||{})[id]||{};DB.setRadek(curMonth,id,{naVedomi:r.naVedomi?null:stamp()});};
    const fb=tr.querySelector('[data-act="zmena"]');
    if(fb)fb.onclick=()=>{const r=(monthData.radky||{})[id]||{};DB.setRadek(curMonth,id,{budeZmena:r.budeZmena?null:true,budeZmenaBy:r.budeZmena?null:stamp()});};
  });
}

/* ═══ Modál uživatelů / rolí (admin) ═══ */
function openUsersModal(){
  document.getElementById("modalRoot").innerHTML=`
   <div class="modal-bg"><div class="modal" id="usersModal">
     <h2>👥 Uživatelé a role</h2>
     <div class="hint">Přiřaď každému přihlášenému jeho roli — uloží se hned. (příprava a stavbyvedoucí mají stejná práva)</div>
     <div id="usersList"></div>
     <div class="modal-actions"><span></span><button class="btn btn-primary" id="uClose">Hotovo</button></div>
   </div></div>`;
  document.getElementById("uClose").onclick=closeModal;
  document.querySelector(".modal-bg").onclick=e=>{if(e.target.classList.contains("modal-bg"))closeModal();};
  renderUsersList();
}
function renderUsersList(){
  const box=document.getElementById("usersList");if(!box)return;
  const entries=Object.entries(users||{});
  if(!entries.length){box.innerHTML=`<div class="hint">Zatím se nikdo nepřihlásil.</div>`;return;}
  box.innerHTML=entries.map(([uid,u])=>{
    const ident=u.email||u.telefon||uid;
    const opts=Object.keys(ROLE_LABEL).map(r=>`<option value="${r}" ${(u.role||'priprava')===r?'selected':''}>${ROLE_LABEL[r]}</option>`).join("");
    return `<div class="user-row">
      <div class="user-info"><b>${esc(u.jmeno||ident)}</b><div class="user-sub">${esc(ident)}${u.role?'':' · <span style="color:var(--wait1)">role nenastavena</span>'}</div></div>
      <select class="user-role" data-uid="${uid}">${opts}</select>
    </div>`;
  }).join("");
  box.querySelectorAll(".user-role").forEach(sel=>{ sel.onchange=()=>DB.setUserRole(sel.dataset.uid,sel.value); });
}

/* ═══ Modál stavby ═══ */
function closeModal(){document.getElementById("modalRoot").innerHTML="";}
function openStavbaModal(id){
  const edit=!!id;const s=edit?stavby[id]:{kod:"",nazev:"",stavbyvedouci:"",objednatel:"",poznamka:""};
  document.getElementById("modalRoot").innerHTML=`
   <div class="modal-bg"><div class="modal">
     <h2>${edit?"Upravit stavbu":"Nová stavba"}</h2>
     <div class="field"><label>Kód stavby</label><input id="sKod" value="${esc(s.kod)}" placeholder="např. 925125001"></div>
     <div class="field"><label>Název</label><input id="sNazev" value="${esc(s.nazev||"")}" placeholder="Rekonstrukce…"></div>
     <div class="field"><label>Stavbyvedoucí</label><input id="sStavby" value="${esc(s.stavbyvedouci||"")}" placeholder="jméno"></div>
     <div class="field"><label>Objednatel <span style="text-transform:none;color:#64748b">(víc oddělte „+", např. KSUS+město → 2 řádky)</span></label><input id="sObjednatel" value="${esc(s.objednatel||"")}" placeholder="ŘSD / KSUS+město"></div>
     <div class="field"><label>Poznámka ke stavbě</label><input id="sPozn" value="${esc(s.poznamka||"")}" placeholder="cokoliv důležitého ke stavbě"></div>
     <div class="modal-actions">
       <div>${edit?`<button class="btn" id="sDel" style="color:#ef4444;border-color:#5b2330">Smazat</button>`:""}</div>
       <div style="display:flex;gap:10px"><button class="btn" id="sCancel">Zrušit</button><button class="btn btn-primary" id="sSave">${edit?"Uložit":"Přidat"}</button></div>
     </div></div></div>`;
  document.getElementById("sCancel").onclick=closeModal;
  document.querySelector(".modal-bg").onclick=e=>{if(e.target.classList.contains("modal-bg"))closeModal();};
  document.getElementById("sSave").onclick=()=>{
    const kod=document.getElementById("sKod").value.trim(),nazev=document.getElementById("sNazev").value.trim();
    const stavbyvedouci=document.getElementById("sStavby").value.trim(),objednatel=document.getElementById("sObjednatel").value.trim();
    const poznamka=document.getElementById("sPozn").value.trim();
    if(!kod){alert("Vyplň kód stavby.");return;}
    const data={kod,nazev,stavbyvedouci,objednatel,poznamka};
    if(edit)DB.updateStavba(id,data);else DB.addStavba(data);closeModal();};
  const del=document.getElementById("sDel");
  if(del)del.onclick=()=>{if(confirm("Smazat stavbu ze seznamu? (zmizí ve všech měsících)")){DB.removeStavba(id);closeModal();}};
}

function bindUI(){
  document.getElementById("fab").onclick=()=>openStavbaModal(null);
  document.getElementById("search").oninput=render;
  document.getElementById("hideEmpty").onchange=render;
  document.getElementById("hideNefakt").onchange=render;
  document.getElementById("monthSel").onchange=e=>selectMonth(e.target.value);
  document.getElementById("btnUsers").onclick=openUsersModal;
  document.getElementById("btnNewMonth").onclick=async()=>{const nm=nextMonthStr(monthsList[0]||curMonthStr());try{await DB.createMonth(nm);}catch(e){alert("Měsíc smí založit jen admin/ekonomka.");return;}monthsList=await DB.listMonths();curMonth=nm;buildMonthSel();selectMonth(nm);};
  document.getElementById("btnDelMonth").onclick=async()=>{
    if(!isAdmin())return;
    if(!confirm(`Smazat celý měsíc „${monthLabel(curMonth)}" včetně všech zadaných částek a stavů? Nevratné.`))return;
    await DB.deleteMonth(curMonth);
    monthsList=await DB.listMonths();
    if(!monthsList.length){const m=curMonthStr();await DB.createMonth(m);monthsList=[m];}
    curMonth=monthsList[0];buildMonthSel();selectMonth(curMonth);
  };
  document.getElementById("btnLock").onclick=async()=>{const lock=!monthData.zamceno;
    if(lock&&!confirm("Uzavřít měsíc? Po uzavření už nepůjde nic měnit (jen čtení)."))return;
    if(!lock&&!confirm("Odemknout měsíc a povolit úpravy?"))return;await DB.setLock(curMonth,lock);};
  document.getElementById("wrap").addEventListener("click",e=>{
    const pozn=e.target.closest("tr.poznrow");if(pozn){openStavbaModal(pozn.dataset.id);return;}
    const cell=e.target.closest("td.stavba");if(!cell)return;const sid=cell.closest("tr").dataset.sid;if(sid)openStavbaModal(sid);});
}

(async function(){bindUI();await DB.init();await startAuth();})();
if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js").catch(()=>{});}
